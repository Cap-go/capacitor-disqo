<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@capgo/capacitor-disqo Example</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="container">
      <p class="eyebrow">Private plugin sandbox</p>
      <h1>Disqo Pulse bridge</h1>
      <p class="lead">Validate the Android SDK wiring, token callbacks, accessibility deep link, and service-state checks.</p>

      <div class="field-grid">
        <label for="api-url">API URL</label>
        <input id="api-url" type="url" value="https://pulse.example.internal" />

        <label for="user-id">User ID</label>
        <input id="user-id" type="text" value="member-123" />

        <label for="access-token">Access token</label>
        <input id="access-token" type="text" value="" placeholder="Paste a JWT for the token callbacks" />
      </div>

      <div class="actions">
        <button id="get-sdk-status">Get SDK status</button>
        <button id="get-version">Get plugin version</button>
        <button id="initialize">Initialize</button>
        <button id="start">Start</button>
        <button id="stop">Stop</button>
        <button id="open-settings">Open accessibility settings</button>
        <button id="get-state">Get service state</button>
      </div>

      <pre id="plugin-output">Press a button to run an action.</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
